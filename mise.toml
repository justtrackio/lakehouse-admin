[tools]
bun = "1.3.6"
go = "1.25.7"
gofumpt = "0.9.2"
golangci-lint = "2.10.1"
mockery = "3.6.4"

[tasks."ci:backend-lint"]
description = "Run backend lint"
dir = "backend"
run = "golangci-lint run"

[tasks."ci:backend-test"]
description = "Run backend tests"
dir = "backend"
run = "go test ./..."

[tasks."ci:frontend-lint"]
description = "Run frontend lint"
dir = "frontend"
run = "bun run lint"

[tasks."ci:frontend-build"]
description = "Run frontend build"
dir = "frontend"
run = "bun run build"

[tasks."build:frontend"]
description = "Build frontend assets"
dir = "frontend"
run = "bun run build"

[tasks."build:copy-frontend"]
description = "Copy frontend assets to backend/public"
run = "rm -rf backend/public/* && cp -r frontend/dist/. backend/public/"

[tasks."build:backend"]
description = "Build backend"
dir = "backend"
run = "go build ./..."

[tasks.build]
description = "Build frontend and backend"
run = """
mise run build:frontend
mise run build:copy-frontend
mise run build:backend
"""

[tasks.ci]
description = "Run local CI jobs"
run = """
mise run ci:backend-lint
mise run ci:backend-test
mise run ci:frontend-lint
mise run ci:frontend-build
"""
